name: Rust Test, Lint

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - "Makefile"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - "Makefile"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: "Run with debug logging"
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep in sync with rust-toolchain.toml
  RUST_NIGHTLY_VERSION: "nightly-2026-01-07"

jobs:
  rust-base:
    name: Rust Test & Lint
    uses: phylaxsystems/actions/.github/workflows/rust-base.yaml@main
    with:
      runner: "phylax-self-hosted"
      rust-channel: "nightly-2026-01-07"
      require-lockfile: true
      use-nextest: true
      enable-sccache: true
      sccache-backend: "local"

  rust-advisories:
    name: Rust Advisory Audit
    runs-on: phylax-self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories

name: Rust Test, Lint

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - "Makefile"
      - "AGENTS.md"
      - "README.md"
      - "scripts/**"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - "Makefile"
      - "AGENTS.md"
      - "README.md"
      - "scripts/**"
      - "rust-toolchain.toml"
      - "rustfmt.toml"
      - ".github/workflows/ci.yml"
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: "Run with debug logging"
        required: false
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep in sync with rust-toolchain.toml
  RUST_NIGHTLY_VERSION: "nightly-2026-01-07"

jobs:
  rust-base:
    name: Rust Test & Lint
    uses: phylaxsystems/actions/.github/workflows/rust-base.yaml@main
    with:
      runner: "phylax-self-hosted"
      rust-channel: "nightly-2026-01-07"
      require-lockfile: true
      use-nextest: true
      enable-sccache: true
      sccache-backend: "local"

  rust-advisories:
    name: Rust Advisory Audit
    runs-on: phylax-self-hosted
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup toolchain install "$RUST_NIGHTLY_VERSION" --profile minimal --no-self-update
      - name: Install cargo-deny
        run: cargo +nightly-2026-01-07 install cargo-deny --version 0.19.2 --locked
      - name: Run advisory audit
        run: cargo +nightly-2026-01-07 deny --all-features check advisories

  agent-smoke:
    name: Agent CLI Smoke
    runs-on: phylax-self-hosted
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: true
      PCL_AUTH_NO_BROWSER: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: rustup toolchain install "$RUST_NIGHTLY_VERSION" --profile minimal --no-self-update
      - name: Run agent smoke contract
        run: make agent-smoke
